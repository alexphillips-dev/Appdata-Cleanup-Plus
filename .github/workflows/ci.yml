name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  validate:
    name: Validate plugin
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Check JavaScript syntax
        run: |
          node --check source/appdata.cleanup.plus/usr/local/emhttp/plugins/appdata.cleanup.plus/scripts/appdata.cleanup.plus.shared.js
          node --check source/appdata.cleanup.plus/usr/local/emhttp/plugins/appdata.cleanup.plus/scripts/appdata.cleanup.plus.panels.js
          node --check source/appdata.cleanup.plus/usr/local/emhttp/plugins/appdata.cleanup.plus/scripts/appdata.cleanup.plus.js

      - name: Check shell syntax
        run: bash -n scripts/*.sh pkg_build.sh

      - name: Run release guards
        run: |
          bash scripts/release_guard.sh
          bash scripts/ca_readiness_guard.sh

      - name: Prepare Unraid path fixtures
        run: |
          sudo mkdir -p /mnt/user /mnt/fcache /mnt/docker_vm_nvme
          sudo chmod 0777 /mnt/user /mnt/fcache /mnt/docker_vm_nvme

      - name: Run behavior smoke test
        run: bash scripts/test_behavior.sh
